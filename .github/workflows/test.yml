name: DMS CI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Tests
        run: mvn -B test
      - name: Run Demo for Console Output
        run: mvn -B exec:java -Dexec.mainClass="ke.ac.kca.dms.Main"
